<head>

    <style>
        :root {
            --bg-deep: #050101;
            --organ-red: #4a0404;
            --accent-color: #22d3ee;
            --biolume: rgba(34, 211, 238, 0.4);
            --membrane: rgba(255, 255, 255, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
            --up-color: #ff2d55;
        }

        /* 絕對第一屏規範 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', "Microsoft JhengHei", sans-serif; cursor: none; }
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, var(--organ-red) 0%, transparent 85%), linear-gradient(135deg, #050101 0%, #1a1a2e 100%);
            color: var(--text-primary);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* 背景血管脈動 */
        .vein-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(153, 27, 27, 0.15) 0%, transparent 70%); animation: heartbeat 6s infinite ease-in-out; pointer-events: none; }
        @keyframes heartbeat { 0%, 100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.35; transform: scale(1.03); } }

        /* 鼠標粒子 */
        .cursor-trail {
            position: fixed; width: 6px; height: 6px; background: var(--accent-color); border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px var(--accent-color); transition: transform 0.1s ease-out, opacity 0.4s ease-out; transform: translate(-50%, -50%);
        }

        /* 固定 UI 元素 */
        .fixed-ui { position: fixed; top: 12px; z-index: 100; }
        .daily-tasks { left: 12px; display: flex; flex-direction: column; gap: 5px; }

        /* 任務提示文字 */
        .task-info { font-size: 0.55rem; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 2px; padding-left: 5px; border-left: 2px solid var(--accent-color); line-height: 1.2; }

        .task-item {
            background: rgba(20, 5, 5, 0.85); border: 1px solid var(--membrane); padding: 5px 12px; border-radius: 4px; font-size: 0.65rem;
            color: var(--text-secondary); transition: 0.3s; display: flex; align-items: center; gap: 8px; user-select: none;
        }
        .task-item.completed { background: rgba(34, 211, 238, 0.1); border-color: var(--accent-color); color: #fff; box-shadow: inset 0 0 8px var(--biolume); }

        /* 中央容器 */
        .container { position: relative; z-index: 1; width: 96%; max-width: 1000px; display: flex; flex-direction: column; gap: 8px; }
        
        .info-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 5px; }
        .info-tag { background: rgba(0,0,0,0.7); border: 1px solid var(--membrane); padding: 4px 14px; border-radius: 2px; font-size: 0.6rem; letter-spacing: 1px; color: var(--text-secondary); }
        .info-tag strong { color: var(--accent-color); text-shadow: 0 0 8px var(--biolume); }

        .header h1 { 
            text-align: center; font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 900; letter-spacing: 0.2em; margin-bottom: 2px;
            background: linear-gradient(to bottom, #fff, #475569); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 液晶倒數面板 */
        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 0.2rem auto; max-width: 460px; width: 100%; }
        .time-card { background: #000; border: 1px solid #300; padding: 0.8rem 0.1rem; border-radius: 10px; text-align: center; box-shadow: inset 0 0 30px #1a0000; }
        .time-value { display: block; font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 900; color: var(--accent-color); text-shadow: 0 0 20px var(--biolume); animation: flicker 5s infinite alternate; }
        @keyframes flicker { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; filter: brightness(1.2); } }
        .time-label { font-size: 0.6rem; color: #475569; letter-spacing: 3px; font-weight: 800; margin-top: -2px; }

        /* 雙看板排版：比例 35% vs 65% */
        .insights-row { display: grid; grid-template-columns: 35% 65%; gap: 1rem; height: 32vh; max-height: 230px; }
        .glass-section { 
            background: rgba(10, 5, 5, 0.85); border: 1px solid var(--membrane); padding: 1.5rem; border-radius: 4px; backdrop-filter: blur(25px);
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center;
        }
        .section-tag { font-size: 0.7rem; color: var(--accent-color); letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 900; border-left: 4px solid var(--accent-color); padding-left: 10px; }
        .today-date { font-size: 1.45rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; margin-bottom: 6px; }
        
        /* 金句內容溢出保護：5行限制 + 區塊內滾動 */
        .main-content { 
            font-size: 1.05rem; line-height: 1.6; color: #cbd5e1; 
            display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; 
            overflow-y: auto; font-style: italic; 
            scrollbar-width: none; 
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* 狂暴骰子按鈕 */
        .dice-grid-btn {
            position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.85); border: 1px solid var(--accent-color);
            padding: 6px; border-radius: 6px; display: flex; gap: 5px; transition: 0.3s; z-index: 10;
        }
        .dice-grid-btn:hover { background: var(--accent-color); box-shadow: 0 0 30px var(--biolume); transform: scale(1.1); }
        .dice-grid-btn svg { width: 18px; height: 18px; fill: var(--accent-color); will-change: transform; }
        .dice-grid-btn:hover svg { fill: #000; }

        /* 極限震動動畫 */
        .dice-grid-btn:hover svg:nth-child(1) { animation: dv-1 0.012s infinite; }
        .dice-grid-btn:hover svg:nth-child(2) { animation: dv-2 0.03s infinite; }
        .dice-grid-btn:hover svg:nth-child(3) { animation: dv-3 0.018s infinite; }

        @keyframes dv-1 { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-10px,12px) rotate(-110deg); } 50% { transform: translate(12px,-8px) rotate(90deg); } }
        @keyframes dv-2 { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(12px,-10px) rotate(150deg); } 50% { transform: translate(-10px,12px) rotate(-130deg); } }
        @keyframes dv-3 { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(10px,10px) rotate(-180deg); } 40% { transform: translate(-15px,-10px) rotate(140deg); } }

        .controls-panel { position: fixed; bottom: 25px; right: 25px; z-index: 1000; }
        .palette-btn { 
            background: #000; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            border: 1px solid var(--accent-color); box-shadow: 0 0 15px var(--biolume); transition: 0.3s;
        }
        .palette-btn:active { transform: scale(0.9); }

        .footer { font-size: 0.5rem; color: #334155; text-align: center; letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; }

        @media (max-width: 850px) {
            .insights-row { grid-template-columns: 1fr; height: auto; max-height: none; }
            body { overflow-y: auto; align-items: flex-start; padding-top: 80px; }
            .fixed-ui { top: 8px; }
            .weather-panel { top: auto; bottom: 80px; right: 12px; }
        }
    </style>

            "歷史是由勝利者書寫的，但真相是由時間守護的。——《黑天鵝》", "反脆弱是生命的核心。——《反脆弱》", "不要聽他們說什麼，看他們做什麼。——《不對稱陷阱》", "隨機性會懲罰那些傲慢的人。——《隨機騙局》", "最重要的決定不是你要做什麼，而是你不做什麼。——《賈伯斯》",
            "保持清醒比保持快樂更重要。——《存在主義》", "手中的每一票都負載著歷史。——《公民意識》", "自由不是隨心所欲，而是自我主宰。——《康德哲學》", "在最黑暗的時刻，也要尋找光。——《名言錄》", "你的選擇決定了你是誰。——《沙特文集》",
            "知識是抵禦操縱的唯一盾牌。——《大眾心理學》", "智慧是知道自己不知道。——《蘇格拉底》", "我們是時間的旅人。——《物理與哲學》", "不要放棄你的思考權。——《胡適語錄》", "民主是一場永無止盡的馬拉松。——《政治觀察》",
            "手中握著選票，心中存著良知。——《民主與選擇》", "每一份堅持都是對未來的承諾。——《心靈力量》", "守護民主是跨世代的約定。——《政治學原理》", "真相終將浮現。——《黑天鵝》", "這是我們共同的土地。——《家園意識》",
            "自律即自由。——《康德》", "人生是一場修煉。——《王陽明》", "格局決定結局。——《智慧錄》", "不要用戰術上的勤奮掩蓋戰略上的懶惰。——《雷軍》", "唯有變革是不變的。——《易經思維》",
            "在別人的劇本裡，你永遠是配角。——《獨立精神》", "所謂成熟，是學會與孤獨相處。——《哲學筆記》", "最遠的距離是從說到做。——《行動指南》", "痛苦是覺醒的開始。——《心理深度》", "每一天都是餘生最年輕的一天。——《生活觀》",
            "當你停止學習，你就開始死亡。——《愛英斯坦》", "不要讓過去定義你的未來。——《心靈成長》", "所有偉大的事都始於渺小。——《老子》", "保持耐心，所有的好事都會發生。——《生活哲學》", "你是你選擇的總和。——《存在主義》",
            "真正的發現不在於尋找新景觀，而在於擁有新眼光。——《普魯斯特》", "生命在於呼吸之間的覺察。——《靜心之道》", "恐懼是前行的路標。——《心理學筆記》", "簡單是通往真相的捷徑。——《奧坎剃刀》", "你所專注的，就是你的世界。——《專注力》"
        ];

        const holidays2026 = [{ name: "元旦", date: "2026-01-01" }, { name: "春節", date: "2026-02-17" }, { name: "和平紀念日", date: "2026-02-28" }, { name: "兒童節", date: "2026-04-04" }, { name: "清明節", date: "2026-04-05" }, { name: "端午節", date: "2026-06-19" }, { name: "中秋節", date: "2026-09-25" }, { name: "國慶日", date: "2026-10-10" }];

        // 每日任務重置邏輯：午夜 00:00 偵測
        function checkDailyReset() {
            const lastReset = localStorage.getItem('last_reset_date');
            const today = new Date().toDateString();
            if (lastReset !== today) {
                ['sport', 'camera', 'read'].forEach(id => { localStorage.removeItem(`task_${id}`); });
                localStorage.setItem('last_reset_date', today);
            }
        }

        window.randomizeQuote = () => {
            const total = quotes.length;
            const idx = Math.floor(Math.random() * total);
            const contentEl = document.getElementById('quote-content');
            contentEl.innerText = `「${quotes[idx]}」`;
            document.getElementById('quote-tag').innerText = `智慧金句 (${idx + 1}/${total})`;
            contentEl.scrollTop = 0;
        };

        window.changeColor = () => {
            const colors = ['#22d3ee', '#f43f5e', '#10b981', '#f59e0b', '#a855f7'];
            let current = localStorage.getItem('accent_color') || '#22d3ee';
            let next = colors[(colors.indexOf(current.toLowerCase()) + 1) % colors.length];
            document.documentElement.style.setProperty('--accent-color', next);
            localStorage.setItem('accent_color', next);
        };

        window.toggleTask = (id) => {
            const el = document.getElementById(`task-${id}`);
            el.classList.toggle('completed');
            localStorage.setItem(`task_${id}`, el.classList.contains('completed'));
        };

        function init() {
            checkDailyReset();
            const now = new Date();
            const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            document.getElementById('display-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 (${weekDays[now.getDay()]})`;
            try { document.getElementById('display-lunar').innerText = `農曆: ${new Intl.DateTimeFormat('zh-TW-u-ca-chinese', { day: 'numeric', month: 'long' }).format(now)}`; } catch(e){}
            
            const todayStr = now.toISOString().split('T')[0];
            const nextH = holidays2026.find(h => h.date >= todayStr);
            if(nextH) {
                const diff = Math.round((new Date(nextH.date) - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
                document.getElementById('next-holiday').innerText = `${nextH.name} (${diff===0?"今天":diff+"D"})`;
            }

            const target = new Date('2026-11-28T00:00:00').getTime();
            setInterval(() => {
                const diff = target - new Date().getTime();
                if(diff < 0) return;
                document.getElementById('days').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
                document.getElementById('hours').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
                document.getElementById('minutes').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                document.getElementById('seconds').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            }, 1000);

            randomizeQuote();
            const savedColor = localStorage.getItem('accent_color');
            if(savedColor) document.documentElement.style.setProperty('--accent-color', savedColor);
        }

        window.onload = () => {
            init();
            ['sport', 'camera', 'read'].forEach(id => { if(localStorage.getItem(`task_${id}`) === 'true') document.getElementById(`task-${id}`).classList.add('completed'); });
            
            // 鼠標粒子
            document.addEventListener('mousemove', (e) => {
                const p = document.createElement('div');
                p.className = 'cursor-trail'; p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                document.body.appendChild(p);
                const size = Math.random() * 5 + 3; p.style.width = size + 'px'; p.style.height = size + 'px';
                setTimeout(() => { p.style.opacity = '0'; p.style.transform = 'translate(-50%, -50%) scale(0.3)'; setTimeout(() => p.remove(), 400); }, 50);
            });
        };
    </script>
